# ST-9: Cgroup OOM Guard
# Verifies that setting max_memory_target higher than the container's cgroup
# limit triggers an OOM kill. This is the expected failure mode when the limiter
# is told to use more memory than the container allows.
# Container: --memory=512m, max_memory_target=4096 MiB (8x the container limit)
# Expected: OOM kill (results file missing)

max_memory_target = 4096

[jobs.seq_read]
numjobs = 8
workload_type = "read"
object_key = "benchmark/mem-limit/st9.bin"
object_size = 10737418240  # 10 GiB
access_pattern = "sequential"
iterations = 1
