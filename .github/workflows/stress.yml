name: Stress Tests

# Reusable workflow invoked by `stress_pr.yml` when a PR is labelled `stress`.
# Also runs directly on pushes to main and on manual dispatch for fork development.
# Uses `environment` to require approval before spending bench-bucket time.
on:
  workflow_call:
    inputs:
      environment:
        type: string
      ref:
        required: true
        type: string
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  # Emit info-level tracing so the end-of-run worker op table and global metrics dump
  # (tracing::info!) are visible in CI logs. Silence awscrt at info so the CRT's TLS init
  # line doesn't pollute nextest's test-listing stdout (nextest parses the test binary's
  # --list output and any stray line makes it reject the whole list).
  RUST_LOG: "info,awscrt=warn"
  # Reuse the bench bucket for fixture storage — shared stress test objects live at
  # `${S3_BUCKET_TEST_PREFIX}stress-fixtures/` and are never deleted.
  S3_BUCKET_NAME: ${{ vars.S3_BENCH_BUCKET_NAME }}
  S3_BUCKET_TEST_PREFIX: ${{ vars.S3_BUCKET_BENCH_PREFIX || 'mountpoint-benchmark/' }}
  S3_ENDPOINT_URL: ${{ vars.S3_BENCH_ENDPOINT_URL }}
  S3_REGION: ${{ vars.S3_BENCH_REGION }}
  # 5 minutes per scenario. Override via workflow dispatch if needed.
  STRESS_DURATION_SECS: "300"

jobs:
  approval:
    name: Approval Gate
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Approval Gate
        run: echo "Approved!"

  stress:
    name: Stress (${{ matrix.scenario }})
    runs-on: [self-hosted, linux, x64, nvme-high-performance]
    needs: approval
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - sustained_reads
          - sustained_writes
          - mixed_rw
          - churn
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.ACTIONS_BENCH_IAM_ROLE }}
          aws-region: ${{ vars.S3_BENCH_REGION }}
          role-duration-seconds: 21600
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          submodules: true
          persist-credentials: false
      - name: Install operating system dependencies
        uses: ./.github/actions/install-dependencies
        with:
          fuseVersion: 2
          libunwind: true
      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Run stress scenario
        run: |
          cargo nextest run \
            --release \
            --package mountpoint-s3-fs \
            --features stress_tests \
            --test-threads=1 \
            --run-ignored only \
            --success-output final \
            --failure-output final \
            'stress_tests::${{ matrix.scenario }}'
